- name: Deploy Docker App to Production
  hosts: prod
  remote_user: ubuntu
  become: yes

  vars:
    image_name: "ysafdar/devops-app"
    image_tag: "{{ app_tag }}"

  tasks:
    - name: Install Docker
      apt:
        name: docker.io
        state: present
        update_cache: yes

    - name: Start Docker
      service:
        name: docker
        state: started
        enabled: yes

